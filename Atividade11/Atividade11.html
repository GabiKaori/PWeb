<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formas de Criar Objetos</title>
</head>
<body>
    <script>
        var aluno1 = new Object();
        //usando Object
        aluno1.ra = "00001234";
        aluno1.nome = "Gabriela";
        alert(`ra=${aluno1.ra} nome=${aluno1.nome}`);

        var aluno2 = {}; //usando{}
        aluno2.ra = " 1234";
        aluno2["nome"] = "Igor";
        alert("ra=" + aluno2.ra + " nome=" + aluno2.nome);
        aluno2["email do aluno"] = "igor@gmail.com";
        alert(aluno2["email do aluno"]);

        var aluno3 = { //literal
            ra: "1234567",
            nome: "Kaori", //vírgula opcional

        };
        alert("ra=" + aluno3.ra + " nome=" + aluno3.nome);


        //usando função construtora -
        //this significa público
        function Aluno(ra,nome){
            this.ra = ra;
            this.nome = nome;
            this.MostraDados = function(){
                return "ra=" + this.ra + " nome=" + this.nome;
            }
        }

        var aluno4 = new Aluno("123", "Vitor");
        alert(aluno4.MostraDados());
        alert(aluno4.nome);

        //função contrutora sem parametros
        function Aluno2() {
            var ra; //"escapsulado-escodido"
            var nome;
            this.setRa = function(value){
                this.ra = value;
            }
            this.getRa = function() {
                return this.ra;
            }
            this.setNome = function(value) {
                this.nome = value;
            }
            this.getNome = function() {
                return this.nome;
            }
        }
        var aluno6 = new Aluno2();
        aluno6.setNome("Alana");
        aluno6.setRa("234");
        alert("ra=" + aluno6.getRa() + " nome=" + aluno6.getNome());

        //herança
        function AlunoADS() {
            var numLab;
            this.setnumLab = function(value){
                this.numLab = value;
            }
            this.getnumLab = function() {
                return this.numLab;
            }
        }

        //herança
        AlunoADS.prototype = new Aluno2();
        var aluno7 = new AlunoADS();
        aluno7.setNome("Jorge");
        aluno7.setRa("321");
        aluno7.setnumLab(5);
        alert(aluno7.getNome() + " " + aluno7.getnumLab());

        //usando class
        class Aluno1 {
            constructor() {
                this._ra;
                this._nome;
            }
            setNome(value) {
                this._nome = value;
            }
            getNome() {
                return this._nome;
            }
            setRa(value){
                this._ra = value;
            }
            getRa() {
                return this._ra;
            }
        }
        var objAluno = new Aluno1();
        objAluno.setNome("João");
        objAluno.setRa('543');
        alert(`nome=${objAluno.getNome()}`);

        //herança
        class AlunoADS1 extends Aluno1 {
            constructor() {
                //super chama o construtor da classe pai
                super();
                this._numLab;
            }
            setNumLab(value) {
                this._numLab = value;
            }
            getNumLab() {
                return this._numLab;
            }
        }
        var objAlunoADS = new AlunoADS1();
        objAlunoADS.setNome("Caio");
        objAlunoADS.setRa("678");
        objAlunoADS.setNumLab(6);
        alert(`nome=${objAlunoADS.getNome()}
               ra=${objAlunoADS.getRa()}
               numlab=${objAlunoADS.getNumLab()}`);

        //OUTROS

        //cópia de objetos
        var obj1 = new Object();
        var obj2 = obj1;
        obj1.nome = "Matheus";
        alert(obj2.nome);

        //metodos e atributos - públicos e privados
        class ContaBancaria {
            #cpf; //atributo privado

            constructor(nome, saldoInicial) {
                this.nome = nome; //atributo público
                this.saldo = saldoInicial;
            }

            setCpf(value) {
                this.cpf = value;
            }
            getCpf() {
                return this.cpf;
            }
            getSaldo() {
                return this.saldo;
            }
            //metodo publico
            depositar(valor) {
                this.saldo += valor;
                this.#registrarTransacao(valor);
                //Utilizando o modificador # para metodo privado
            }
            //metodo privado
            #registrarTransacao(valor) {
                console.log(`Depósito de R$ ${valor}
                realizado pelo ${this.nome} e o
                Saldo R$ ${this.saldo} para cpf
                ${this.getCpf()} ou ${this.#cpf}`);
            }
        };

        const conta = new ContaBancaria("Gustavo", 1000);
        conta.setCpf(123);
        conta.depositar(50);
        //ver no console se aparece

        //Object.fromEntries() é um método JavaScript
        //  que transforma um array de pares de chave-valor em um objeto

        const arr = [
            ['codigo', 1],
            ['nome', "Lucas"],
            ['idade', 23]
        ];
        const obj = Object.fromEntries(arr);
        alert(obj); //imprime object
        alert(obj.nome); //imprime o nome
        alert(JSON.stringify(obj));
        //converte em json

        //Object.create() cria um novo objeto, utiizando um outro bjeto existente

        //alteração no prototipo reflete no novo
        const objEmpresa ={
            empresa: 'ZF do Brasil'
        };
        const funcionario =
        Object.create(objEmpresa, {
            nome: {
                value: 'Jorge'
            },
            endereco: {
                value: 'Av. São Paulo'
            }
        });
        console. log(funcionario.empresa);
        console.log(funcionario.nome);
        console.log(funcionario.endereco);

        const objNovaEmpresa = {
            empresa: 'ZF do Brasil'
        };
        const objVeiculo = {
            placa: 'XXX 1234'
        };

        const motorista = Object.assign({
            cpf: "123"
        }, objNovaEmpresa, objVeiculo);
        console.log(motorista);
        //empresa: 'ZF do Brasil', placa: 'XXX 1234'

    </script>
</body>
</html>
